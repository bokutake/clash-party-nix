name: pr-ci

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "flake.nix"
      - "flake.lock"
      - "modules/**"
      - "packages/**"
      - "scripts/**"
      - "versions/upstream.json"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Optional upstream Clash Party tag override.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve tracked upstream tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="$(jq -r '.clashPartyTag' versions/upstream.json)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.upstream_tag }}" ]; then
            tag="${{ inputs.upstream_tag }}"
          fi

          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "failed to resolve upstream tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  nix-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Run flake checks without builds
        run: nix flake check --no-build

  build-linux:
    needs: resolve-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: amd64
          - arch: arm64
            target: arm64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone upstream at requested tag
        run: |
          git clone https://github.com/mihomo-party-org/clash-party upstream
          cd upstream
          git checkout "${{ needs.resolve-tag.outputs.tag }}"

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: upstream/pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            ruby \
            rpm \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            patchelf \
            xvfb

      - name: Build upstream release
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: |
          bash ./scripts/build-release.sh ./upstream "${{ matrix.arch }}" "${{ matrix.target }}"

      - name: Repackage Linux tree as tar.xz
        run: |
          bash ./scripts/package-linux-tarball.sh ./upstream "${{ matrix.arch }}" "${{ matrix.target }}" "${{ needs.resolve-tag.outputs.tag }}"

      - name: Smoke test built output
        run: |
          bash ./scripts/smoke-test.sh ./upstream "${{ matrix.arch }}" "${{ matrix.target }}" "${{ needs.resolve-tag.outputs.tag }}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clash-party-linux-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}
          path: |
            upstream/dist/*.tar.xz
            upstream/dist/*.tar.xz.sha256
          if-no-files-found: error
